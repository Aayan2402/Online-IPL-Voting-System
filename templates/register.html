<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IPL Voting System - Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: url('{{ url_for("static", filename="ipl_bg.jpg") }}') center/cover no-repeat fixed;
      display: flex; align-items: center; justify-content: center;
    }
    .overlay { position: fixed; inset: 0; background: linear-gradient(135deg, rgba(10,10,40,0.82) 0%, rgba(60,10,80,0.78) 100%); z-index: 0; }
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      padding: 48px 44px 40px;
      max-width: 420px; width: 90%;
      box-shadow: 0 8px 60px rgba(0,0,0,0.4);
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo { font-size: 48px; text-align: center; display: block; margin-bottom: 10px; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-size: 1.8rem; font-weight: 800; text-align: center;
      background: linear-gradient(90deg, #4cc9f0, #c77dff, #f9c74f);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .subtitle { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 28px; }

    .flash {
      padding: 10px 16px; border-radius: 12px;
      font-size: 0.85rem; font-weight: 600;
      margin-bottom: 18px; text-align: center;
    }
    .flash.error { background: rgba(244,84,95,0.2); color: #f4845f; border: 1px solid rgba(244,84,95,0.3); }
    .flash.success { background: rgba(76,201,113,0.2); color: #4cc971; border: 1px solid rgba(76,201,113,0.3); }

    label { display: block; color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-bottom: 6px; margin-top: 16px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4cc9f0; }
    input::placeholder { color: rgba(255,255,255,0.25); }

    .hint { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 4px; }

    .btn-submit {
      width: 100%; margin-top: 26px;
      padding: 14px;
      border-radius: 50px; border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem; font-weight: 700;
      background: linear-gradient(90deg, #4cc9f0, #c77dff);
      color: #fff; cursor: pointer;
      box-shadow: 0 4px 24px rgba(76,201,240,0.3);
      transition: transform 0.18s, filter 0.18s;
    }
    .btn-submit:hover { transform: translateY(-2px) scale(1.02); filter: brightness(1.08); }
    .btn-submit:active { transform: scale(0.97); }

    .link-row { text-align: center; margin-top: 18px; color: rgba(255,255,255,0.45); font-size: 0.85rem; }
    .link-row a { color: #f9c74f; text-decoration: none; font-weight: 600; }
    .link-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="card">
    <span class="logo">✍️</span>
    <h1>Create Account</h1>
    <p class="subtitle">Naya account banao aur vote karo</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="Unique username chuno" required/>
      <label>Password</label>
      <input type="password" name="password" placeholder="Strong password likho" required/>
      <p class="hint">Password kam se kam 4 characters ka hona chahiye</p>
      <button type="submit" class="btn-submit">🎉 &nbsp; Register Karo</button>
    </form>

    <div class="link-row">
      Already account hai? <a href="/login">Login karo</a>
    </div>
  </div>
</body>
</html>
