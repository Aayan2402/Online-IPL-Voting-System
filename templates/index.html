<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IPL Voting System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: url('{{ url_for("static", filename="ipl_bg.jpg") }}') center/cover no-repeat fixed;
      display: flex; align-items: center; justify-content: center;
    }
    .overlay { position: fixed; inset: 0; background: linear-gradient(135deg, rgba(10,10,40,0.82) 0%, rgba(60,10,80,0.78) 100%); z-index: 0; }
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      padding: 52px 48px 44px;
      max-width: 480px; width: 90%;
      text-align: center;
      box-shadow: 0 8px 60px rgba(0,0,0,0.4);
      animation: fadeUp 0.7s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .user-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 6px 16px;
      font-size: 0.82rem; color: rgba(255,255,255,0.75);
      margin-bottom: 20px;
    }
    .logo { font-size: 52px; animation: bounce 2s infinite; display: block; margin-bottom: 12px; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(90deg, #f9c74f, #f4845f, #c77dff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    p.sub { color: rgba(255,255,255,0.65); font-size: 0.95rem; margin-bottom: 36px; }
    .btn-group { display: flex; flex-direction: column; gap: 14px; }
    .btn {
      display: block; padding: 15px 28px; border-radius: 50px;
      font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 600;
      text-decoration: none;
      transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
      cursor: pointer; border: none;
    }
    .btn-primary { background: linear-gradient(90deg, #f9c74f, #f4845f); color: #1a0a00; box-shadow: 0 4px 24px rgba(249,199,79,0.35); }
    .btn-secondary { background: linear-gradient(90deg, #c77dff, #7b5ea7); color: #fff; box-shadow: 0 4px 24px rgba(199,125,255,0.3); }
    .btn-logout { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15); }
    .btn:hover { transform: translateY(-3px) scale(1.03); filter: brightness(1.1); }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="card">
    <div class="user-badge">👤 {{ username }}</div>
    <span class="logo">🏏</span>
    <h1>IPL Voting System</h1>
    <p class="sub">Apni favourite IPL team ko vote do! 🏏</p>
    <div class="btn-group">
      <a href="/vote" class="btn btn-primary">🗳️ &nbsp; Vote Now</a>
      <a href="/result" class="btn btn-secondary">📊 &nbsp; View Results</a>
      <a href="/logout" class="btn btn-logout">🚪 &nbsp; Logout</a>
    </div>
  </div>
</body>
</html>
